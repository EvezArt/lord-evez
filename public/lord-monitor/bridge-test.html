<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>LORD Bridge Test</title><style>body{margin:0;background:#070b14;color:#e6edff;font-family:Segoe UI,Tahoma,sans-serif;padding:24px}button{background:#15304f;color:#d8ecff;border:1px solid #2f6aa1;border-radius:8px;padding:12px 16px;cursor:pointer;font-weight:600}button:hover{background:#1b3d64}.card{max-width:900px;background:rgba(20,20,40,.9);border:1px solid rgba(100,100,200,.25);border-radius:12px;padding:18px}.muted{color:#99a}pre{background:#000;padding:14px;border-radius:10px;overflow:auto}#status{font-weight:700;color:#9fd3ff}</style></head><body><div class="card"><h1>LORD bridge test</h1><p class="muted">Use this page to verify the browser-side websocket leg of the fusion-update flow. Start the Python listener first, then send a test payload.</p><p>Status: <span id="status">idle</span></p><p><button id="send">Send test fusion-update</button></p><pre id="out"></pre></div><script>const statusEl=document.getElementById('status');const out=document.getElementById('out');function log(x){out.textContent=String(x)+'\n'+out.textContent}document.getElementById('send').addEventListener('click',()=>{statusEl.textContent='connecting';const socket=new WebSocket('ws://127.0.0.1:8765');socket.addEventListener('open',()=>{statusEl.textContent='sending';const payload={type:'fusion-update',detail:{meta:{recursionLevel:12,entityType:'hybrid',timestamp:Date.now()},crystallization:{progress:61,velocity:0},corrections:{current:24567.89,history:[10,100,1000,24567.89]}}};socket.send(JSON.stringify(payload));log(JSON.stringify(payload,null,2));statusEl.textContent='sent';setTimeout(()=>socket.close(),250)});socket.addEventListener('error',()=>{statusEl.textContent='error';log('websocket error: verify the Python listener is running on ws://127.0.0.1:8765')});socket.addEventListener('close',()=>{if(statusEl.textContent!=='error')statusEl.textContent='closed'})});</script></body></html>
