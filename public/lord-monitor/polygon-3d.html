<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>LORD 3D View</title><style>body{margin:0;display:grid;place-items:center;height:100vh;background:#050510;color:#e6edff;font-family:Segoe UI,Tahoma,sans-serif;overflow:hidden}.scene{perspective:900px}.cube{width:180px;height:180px;position:relative;transform-style:preserve-3d;animation:spin 12s linear infinite}.face{position:absolute;width:180px;height:180px;border:1px solid rgba(140,199,255,.45);background:rgba(0,191,255,.08);display:grid;place-items:center;font-family:Courier New,monospace;font-size:24px;color:#9fd3ff;box-shadow:0 0 24px rgba(0,191,255,.14) inset}.f1{transform:translateZ(90px)}.f2{transform:rotateY(180deg) translateZ(90px)}.f3{transform:rotateY(90deg) translateZ(90px)}.f4{transform:rotateY(-90deg) translateZ(90px)}.f5{transform:rotateX(90deg) translateZ(90px)}.f6{transform:rotateX(-90deg) translateZ(90px)}@keyframes spin{from{transform:rotateX(-18deg) rotateY(0deg)}to{transform:rotateX(-18deg) rotateY(360deg)}}#hud{position:fixed;top:14px;left:14px;background:rgba(0,0,0,.55);padding:10px 12px;border-radius:8px;color:#9fd3ff}</style></head><body><div id="hud">R <span id="r">7</span> · crystal <span id="c">0</span>%</div><div class="scene"><div class="cube" id="cube"><div class="face f1" id="front">7</div><div class="face f2">LORD</div><div class="face f3" id="side1">HYB</div><div class="face f4" id="side2">0%</div><div class="face f5">SYNC</div><div class="face f6">LIVE</div></div></div><script>const cube=document.getElementById('cube');window.addEventListener('message',e=>{if(e.data&&e.data.type==='fusion-update'){const d=e.data.detail;const r=Number(d.meta.recursionLevel)||1;const crystal=Math.round(Number(d.crystallization.progress)||0);const ent=String(d.meta.entityType||'hybrid').slice(0,3).toUpperCase();document.getElementById('r').textContent=r;document.getElementById('c').textContent=crystal;document.getElementById('front').textContent=r;document.getElementById('side1').textContent=ent;document.getElementById('side2').textContent=crystal+'%';cube.style.animationDuration=Math.max(3,14-r/2)+'s';cube.style.filter='hue-rotate('+(crystal*1.8)+'deg)';}});</script></body></html>
