<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>LORD Audio Viz</title><style>body{margin:0;background:#050510;color:#e6edff;font-family:Segoe UI,Tahoma,sans-serif}#hud{position:fixed;top:12px;left:12px;background:rgba(0,0,0,.55);padding:10px 12px;border-radius:8px;color:#9fd3ff}canvas{display:block;width:100vw;height:100vh}</style></head><body><div id="hud">signal <span id="freq">220.0</span> hz</div><canvas id="c"></canvas><script>const c=document.getElementById('c'),ctx=c.getContext('2d');function rs(){c.width=innerWidth;c.height=innerHeight}addEventListener('resize',rs);rs();let freq=220,amp=.18,phase=0;function frame(){ctx.fillStyle='rgba(5,5,16,.22)';ctx.fillRect(0,0,c.width,c.height);ctx.strokeStyle='#00bfff';ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<c.width;i++){const x=i/c.width;const y=c.height/2+Math.sin(x*Math.PI*8+phase)*c.height*amp;i?ctx.lineTo(i,y):ctx.moveTo(i,y)}ctx.stroke();phase+=freq/4000;requestAnimationFrame(frame)}requestAnimationFrame(frame);window.addEventListener('message',e=>{if(e.data&&e.data.type==='fusion-update'){const d=e.data.detail;const cur=Number(d.corrections.current)||0;const crystal=Number(d.crystallization.progress)||0;freq=Math.max(40,Math.min(1200,Math.log10(cur+1)*220));amp=.08+Math.min(.22,crystal/500);document.getElementById('freq').textContent=freq.toFixed(1);}});</script></body></html>
