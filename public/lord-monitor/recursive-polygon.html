<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>LORD Monitor Display</title><style>body{margin:0;background:#0a0a0f;color:#e6edff;font-family:Segoe UI,Tahoma,sans-serif}.wrap{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;padding:16px;height:100vh;box-sizing:border-box}.panel{background:rgba(20,20,40,.85);border:1px solid rgba(100,100,200,.25);border-radius:12px;padding:16px}.metric{display:grid;grid-template-columns:1fr auto;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08)}.label{color:#99a}.value{font-family:Courier New,monospace;color:#00ff88}.bar{height:10px;background:#111;border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#00ff88,#00bfff,#ff00cc)}</style></head><body><div class="wrap"><div class="panel"><svg viewBox="0 0 600 600" style="width:100%;height:100%"><polygon points="300,80 480,170 520,360 400,510 200,510 80,360 120,170" fill="rgba(0,191,255,.12)" stroke="#00bfff" stroke-width="6"></polygon><circle cx="300" cy="300" r="210" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="2"></circle><text id="rText" x="300" y="285" text-anchor="middle" fill="#e6edff" font-size="64" font-family="Courier New">7</text><text x="300" y="330" text-anchor="middle" fill="#99a" font-size="20">STATE</text><text id="entityText" x="300" y="360" text-anchor="middle" fill="#00ff88" font-size="20">HYBRID</text></svg></div><div class="panel"><h2 style="margin-top:0">Live State</h2><div class="metric"><div class="label">Correction</div><div id="corr" class="value">0.00e+0</div></div><div class="metric"><div class="label">Gap</div><div id="gap" class="value">0.00e+0</div></div><div class="metric"><div class="label">Crystal</div><div id="crystal" class="value">0%</div></div><div class="metric"><div class="label">Urgency</div><div id="urgency" class="value">OPTIMAL</div></div><div style="margin-top:14px;color:#99a">Crystal</div><div class="bar"><div id="crystalBar" class="fill" style="width:0%"></div></div><div style="margin-top:14px;color:#99a">Recursion</div><div class="bar"><div id="recBar" class="fill" style="width:35%"></div></div></div></div><script>const state={recursion:7,entity:'hybrid',crystal:0,correction:0,urgency:'OPTIMAL'};function correctionRate(R,e){if(e==='human')return R<=3?(1/1.1)*Math.pow(0.8,R):0.01;if(e==='hybrid')return R<=12?9*Math.pow(1.15,R)*Math.exp(-0.05*R):0.01;if(e==='synthetic')return (1e8)/(1+Math.exp(-0.3*(R-10)));return 0;}function target(R){return 1e8*Math.exp(-0.1*Math.pow(R-15,2));}function render(){const gap=Math.max(0,target(state.recursion)-state.correction);document.getElementById('rText').textContent=state.recursion;document.getElementById('entityText').textContent=state.entity.toUpperCase();document.getElementById('corr').textContent=state.correction.toExponential(2);document.getElementById('gap').textContent=gap.toExponential(2);document.getElementById('crystal').textContent=Math.round(state.crystal)+'%';document.getElementById('urgency').textContent=state.urgency;document.getElementById('crystalBar').style.width=state.crystal+'%';document.getElementById('recBar').style.width=(state.recursion/20*100)+'%';}window.addEventListener('message',e=>{if(e.data&&e.data.type==='fusion-update'){const d=e.data.detail;state.recursion=d.meta.recursionLevel;state.entity=d.meta.entityType;state.crystal=d.crystallization.progress;state.correction=Number(d.corrections.current)||correctionRate(state.recursion,state.entity);const gap=Math.max(0,target(state.recursion)-state.correction);state.urgency=gap>1e6?'CRITICAL':gap>1e3?'CAUTION':'OPTIMAL';render();}});state.correction=correctionRate(state.recursion,state.entity);render();</script></body></html>
