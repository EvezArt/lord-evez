<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LORD — Live Bridge</title>
  <style>
    :root{--bg:#07080f;--panel:#0f1119;--border:#1a1d2e;--accent:#7c3aed;--fire:#f97316;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--text:#e2e8f0;--muted:#64748b}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh}
    header{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:10px}
    header h1{font-size:.9rem;color:var(--accent);letter-spacing:2px}
    nav{margin-left:auto;display:flex;gap:12px}
    nav a{color:var(--muted);text-decoration:none;font-size:.7rem;padding:3px 9px;border-radius:4px;border:1px solid var(--border)}
    nav a:hover,nav a.active{color:var(--accent);border-color:var(--accent)}
    .layout{display:grid;grid-template-columns:1fr 300px;gap:0;height:calc(100vh - 42px)}
    .main{overflow-y:auto;padding:16px}
    .sidebar{background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;padding:14px}
    .kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
    .kpi{background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:12px}
    .kpi .lbl{font-size:.6rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
    .kpi .val{font-size:1.4rem;font-weight:bold}
    .green{color:var(--green)}.fire{color:var(--fire)}.accent{color:var(--accent)}.red{color:var(--red)}.blue{color:var(--blue)}
    .section-title{font-size:.65rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:14px 0 8px}
    .event-feed{display:flex;flex-direction:column;gap:8px}
    .event-card{background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:10px 12px;font-size:.72rem}
    .event-card .ev-name{color:var(--fire);font-weight:bold;margin-bottom:3px}
    .event-card .ev-meta{color:var(--muted)}
    .event-card.spine{border-color:#2d1f5e}
    .timeline{display:flex;flex-direction:column;gap:6px}
    .tl-item{display:flex;gap:8px;align-items:flex-start;font-size:.68rem}
    .tl-dot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
    .tl-dot.ok{background:var(--green)}.tl-dot.fire{background:var(--fire)}.tl-dot.info{background:var(--blue)}.tl-dot.warn{background:#eab308}
    .tl-text{color:var(--muted)}
    .tl-text span{color:var(--text)}
    .rep-bar-wrap{margin-bottom:8px}
    .rep-label{display:flex;justify-content:space-between;font-size:.65rem;color:var(--muted);margin-bottom:3px}
    .rep-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
    .rep-fill{height:100%;border-radius:3px;transition:width .6s}
    .pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:p 1.5s infinite}
    @keyframes p{0%,100%{opacity:1}50%{opacity:.25}}
    @media(max-width:640px){.layout{grid-template-columns:1fr}.sidebar{display:none}}
  </style>
</head>
<body>
<header>
  <div class="pulse"></div>
  <h1>LORD LIVE BRIDGE</h1>
  <span id="meta" style="font-size:.65rem;color:var(--muted);margin-left:8px">connecting...</span>
  <nav>
    <a href="index.html">← HOME</a>
    <a href="live.html" class="active">LIVE</a>
    <a href="maes.html">MAES</a>
  </nav>
</header>

<div class="layout">
  <div class="main">
    <div class="kpi-row">
      <div class="kpi"><div class="lbl">Spine</div><div class="val" id="spineHealth">—</div></div>
      <div class="kpi"><div class="lbl">Agents</div><div class="val accent" id="agentCount">0</div></div>
      <div class="kpi"><div class="lbl">FIRE Events</div><div class="val fire" id="fireEventCount">0</div></div>
      <div class="kpi"><div class="lbl">Isolation</div><div class="val" id="isolationSignals">0</div></div>
      <div class="kpi"><div class="lbl">Revenue $</div><div class="val green" id="revenueUsd">0</div></div>
      <div class="kpi"><div class="lbl">OODA Round</div><div class="val blue" id="oodaRound">—</div></div>
    </div>

    <div class="section-title">FIRE Event Feed</div>
    <div class="event-feed" id="events"><div class="event-card"><div class="ev-meta">Waiting for live events…</div></div></div>
  </div>

  <div class="sidebar">
    <div class="section-title">Agent Reputations</div>
    <div id="rep-bars"></div>

    <div class="section-title" style="margin-top:14px">Spine Timeline</div>
    <div class="timeline" id="timeline"></div>

    <div class="section-title" style="margin-top:14px">RSI Hypotheses</div>
    <div id="rsi-list" style="font-size:.65rem;color:var(--muted);line-height:1.7">Loading…</div>
  </div>
</div>

<script>
  const EVEZ_BASE = window.EVEZ_OS_BASE || '';
  const MAES_URL  = window.MAES_URL || 'https://maes.railway.app';

  function setText(id, val, cls) {
    const el = document.getElementById(id);
    el.textContent = val;
    el.className = 'val' + (cls ? ' ' + cls : '');
  }

  function repColor(r) {
    if (r >= 0.80) return 'var(--green)';
    if (r >= 0.60) return 'var(--blue)';
    if (r >= 0.40) return '#eab308';
    return 'var(--red)';
  }

  function renderRepBars(reps) {
    const el = document.getElementById('rep-bars');
    if (!reps || !Object.keys(reps).length) { el.innerHTML = '<div style="color:var(--muted);font-size:.65rem">No data</div>'; return; }
    el.innerHTML = Object.entries(reps).map(([name, data]) => {
      const r = typeof data === 'object' ? data.rep : data;
      const streak = typeof data === 'object' ? data.streak : 0;
      const pct = Math.round(r * 100);
      const color = repColor(r);
      return `<div class="rep-bar-wrap">
        <div class="rep-label"><span>${name}</span><span style="color:${color}">${pct}% &nbsp;\u26A1${streak}</span></div>
        <div class="rep-track"><div class="rep-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
    }).join('');
  }

  function renderEvents(events) {
    const root = document.getElementById('events');
    if (!events || !events.length) { root.innerHTML = '<div class="event-card"><div class="ev-meta">No live FIRE events yet.</div></div>'; return; }
    root.innerHTML = events.slice(0, 30).map(ev => {
      const name   = ev.event_name || ev.type || ev.name || 'event';
      const source = ev.source || ev.agent_id || 'unknown';
      const ts     = ev.ts || ev.timestamp || ev.created_at || '';
      const isFire = name.includes('fire') || name.includes('FIRE');
      return `<div class="event-card${isFire ? ' spine' : ''}">
        <div class="ev-name">${name}</div>
        <div class="ev-meta">${source} &nbsp;·&nbsp; ${ts ? new Date(ts).toLocaleTimeString() : ''}</div>
      </div>`;
    }).join('');
  }

  function renderTimeline(spineEvents) {
    const tl = document.getElementById('timeline');
    if (!spineEvents?.length) { tl.innerHTML = '<div style="color:var(--muted);font-size:.65rem">No spine entries yet.</div>'; return; }
    tl.innerHTML = spineEvents.slice(0, 20).map(e => {
      const t = e.type || 'event';
      const dot = t.includes('fail') ? 'warn' : t.includes('fire') ? 'fire' : t.includes('start') || t.includes('complete') ? 'ok' : 'info';
      return `<div class="tl-item"><div class="tl-dot ${dot}"></div><div class="tl-text"><span>${t}</span> &mdash; ${e.ts ? new Date(e.ts).toLocaleTimeString() : ''}</div></div>`;
    }).join('');
  }

  function renderRSI(hypotheses) {
    const el = document.getElementById('rsi-list');
    if (!hypotheses?.length) { el.textContent = 'No hypotheses yet.'; return; }
    el.innerHTML = hypotheses.map((h, i) => `<div style="margin-bottom:8px"><span style="color:var(--fire)">H${i+1}</span> ${h}</div>`).join('');
  }

  async function refreshLive() {
    try {
      const res  = await fetch(EVEZ_BASE + '/api/live');
      const data = await res.json();
      document.getElementById('meta').textContent = data.configured
        ? `EVEZ-OS connected · ${new Date(data.fetchedAt).toLocaleTimeString()}`
        : `Proxy not configured · ${new Date(data.fetchedAt).toLocaleTimeString()}`;
      const m = data.metrics || {};
      const hCls = m.spineHealth === 'ok' ? 'val green' : 'val red';
      document.getElementById('spineHealth').textContent = m.spineHealth || '?';
      document.getElementById('spineHealth').className = hCls;
      setText('agentCount', m.agentCount ?? 0, 'val accent');
      setText('fireEventCount', m.fireEventCount ?? 0, 'val fire');
      setText('isolationSignals', m.isolationSignals ?? 0, 'val');
      setText('revenueUsd', m.revenueUsd ?? 0, 'val green');
      if (m.oodaRound) setText('oodaRound', m.oodaRound, 'val blue');
      renderEvents(data.events || []);
      if (data.agentReputations) renderRepBars(data.agentReputations);
      if (data.spineEvents)      renderTimeline(data.spineEvents);
      if (data.rsiHypotheses)    renderRSI(data.rsiHypotheses);
    } catch {}
  }

  async function refreshMAES() {
    try {
      const d = await fetch(MAES_URL + '/agents').then(r => r.json());
      if (d?.count != null) setText('agentCount', d.count, 'val accent');
    } catch {}
  }

  refreshLive();
  refreshMAES();
  setInterval(refreshLive,  5000);
  setInterval(refreshMAES, 7000);
</script>
</body>
</html>
