<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LORD — EVEZ Consciousness Dashboard</title>
  <style>
    :root{--bg:#0a0a0f;--panel:#111118;--border:#1e1e2e;--accent:#7c3aed;--fire:#f97316;--green:#22c55e;--red:#ef4444;--text:#e2e8f0;--muted:#64748b}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh}
    header{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px}
    header h1{font-size:1rem;color:var(--accent);letter-spacing:2px}
    nav{margin-left:auto;display:flex;gap:16px}
    nav a{color:var(--muted);text-decoration:none;font-size:0.75rem;padding:4px 10px;border-radius:4px;border:1px solid var(--border)}
    nav a:hover{color:var(--text);border-color:var(--accent)}
    nav a.active{color:var(--accent);border-color:var(--accent)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;padding:20px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px}
    .card h2{font-size:0.7rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
    .stat{font-size:1.6rem;font-weight:bold}
    .green{color:var(--green)}.fire{color:var(--fire)}.accent{color:var(--accent)}.red{color:var(--red)}
    .pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    footer{padding:16px 20px;color:var(--muted);font-size:0.65rem;border-top:1px solid var(--border);margin-top:20px}
  </style>
</head>
<body>
<header>
  <div class="pulse"></div>
  <h1>LORD DASHBOARD</h1>
  <nav>
    <a href="index.html" class="active">HOME</a>
    <a href="live.html">LIVE EVENTS</a>
    <a href="maes.html">MAES AGENTS</a>
  </nav>
</header>

<div class="grid">
  <div class="card">
    <h2>System</h2>
    <div class="stat accent">EVEZ-OS</div>
    <div style="font-size:0.7rem;color:var(--muted);margin-top:6px">Cognition layer active</div>
  </div>
  <div class="card">
    <h2>Agent Ecology</h2>
    <div class="stat green"><a href="maes.html" style="color:inherit;text-decoration:none">MAES →</a></div>
    <div style="font-size:0.7rem;color:var(--muted);margin-top:6px">Agent spawn / verify / checkpoint</div>
  </div>
  <div class="card">
    <h2>Live Events</h2>
    <div class="stat fire"><a href="live.html" style="color:inherit;text-decoration:none">FIRE →</a></div>
    <div style="font-size:0.7rem;color:var(--muted);margin-top:6px">Real-time EVEZ-OS event spine</div>
  </div>
  <div class="card">
    <h2>Repos</h2>
    <div style="font-size:0.72rem;line-height:1.8;margin-top:4px">
      <a href="https://github.com/EvezArt/evez-os" style="color:#818cf8">evez-os</a><br>
      <a href="https://github.com/EvezArt/maes" style="color:#818cf8">maes</a><br>
      <a href="https://github.com/EvezArt/evez-agentnet" style="color:#818cf8">evez-agentnet</a><br>
      <a href="https://github.com/EvezArt/evez-autonomous-ledger" style="color:#818cf8">autonomous-ledger</a>
    </div>
  </div>
</div>

<footer>LORD v3 · EVEZ666 · MAES Phase 1 · 2026-03-25</footer>
</body>
</html>
